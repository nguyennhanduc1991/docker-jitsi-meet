# NextGen Meet - Custom Nginx Configuration

# Override main index.html
location = / {
    try_files /config/jitsi-index.html /index.html;
    add_header Content-Type text/html;
}

# NextGen Meet CSS Files
location /css/nextgen-variables.css {
    alias /config/nextgen-variables.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-mixins.css {
    alias /config/nextgen-mixins.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-components.css {
    alias /config/nextgen-components.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-toolbar.css {
    alias /config/nextgen-toolbar.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-video.css {
    alias /config/nextgen-video.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-animations.css {
    alias /config/nextgen-animations.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/nextgen-override.css {
    alias /config/nextgen-override.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /css/custom.css {
    alias /config/custom.css;
    add_header Content-Type text/css;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

# NextGen Meet JavaScript Files
location /js/nextgen-design-tokens.js {
    alias /config/nextgen-design-tokens.js;
    add_header Content-Type application/javascript;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

location /js/nextgen-inject.js {
    alias /config/nextgen-inject.js;
    add_header Content-Type application/javascript;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

# Serve interface_config.js
location /interface_config.js {
    alias /config/interface_config.js;
    add_header Content-Type application/javascript;
    expires 1d;
    add_header Cache-Control "public, max-age=86400";
}

# Custom index.html
location /custom-index.html {
    alias /config/index.html;
    add_header Content-Type text/html;
}

# Images
location /images/ {
    alias /config/images/;
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
}
