<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob:; img-src 'self' 'unsafe-inline' data: blob: https:; media-src 'self' 'unsafe-inline' 'unsafe-eval' data: blob: https:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' 'unsafe-inline' data: blob: https://fonts.gstatic.com https://unpkg.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://static.cloudflareinsights.com https://unpkg.com; connect-src 'self' 'unsafe-inline' data: blob: https: wss: ws:; object-src 'none'; base-uri 'self';">
    <meta name="google" content="notranslate">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NextGen Meet">
    <meta name="application-name" content="NextGen Meet">
    <meta name="msapplication-TileColor" content="#1976d2">
    <meta name="theme-color" content="#1976d2">
    
    <title>NextGen Meet - Họp trực tuyến đẳng cấp</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="https://meet.thanhnguyen.group/images/favicon.ico">
    <link rel="apple-touch-icon" href="https://meet.thanhnguyen.group/images/apple-touch-icon.png">
    
    <!-- NextGen Meet CSS -->
    <link rel="stylesheet" href="css/nextgen-variables.css">
    <link rel="stylesheet" href="css/nextgen-mixins.css">
    <link rel="stylesheet" href="css/nextgen-components.css">
    <link rel="stylesheet" href="css/nextgen-toolbar.css">
    <link rel="stylesheet" href="css/nextgen-video.css">
    <link rel="stylesheet" href="css/nextgen-animations.css">
    <link rel="stylesheet" href="css/nextgen-override.css">
    <link rel="stylesheet" href="css/custom.css">
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Jitsi Meet CSS sẽ được load sau -->
    <link rel="stylesheet" href="css/all.css">
    
    <style>
        /* NextGen Meet Global Styles */
        :root {
            --nextgen-primary: #1976d2;
            --nextgen-secondary: #ffffff;
            --nextgen-accent: #00bcd4;
            --nextgen-surface: #f5f5f5;
            --nextgen-background: #ffffff;
            --nextgen-text: #212121;
            --nextgen-text-secondary: #757575;
        }
        
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #1976d2 0%, #00bcd4 100%), url('images/welcome-background.png');
            background-size: cover;
            background-position: center;
            margin: 0;
            padding: 0;
        }
        
        .nextgen-meet {
            --nextgen-primary: #1976d2;
            --nextgen-secondary: #ffffff;
            --nextgen-accent: #00bcd4;
        }
        
        /* Override Jitsi Meet styles */
        .welcome {
            background: linear-gradient(135deg, #1976d2 0%, #00bcd4 100%);
            color: white;
        }
        
        .header-text-title {
            color: white !important;
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        .header-text-subtitle {
            color: rgba(255, 255, 255, 0.9) !important;
            font-size: 1.2rem;
            font-weight: 300;
        }
        
        .welcome-page-button {
            background: rgba(255, 255, 255, 0.2) !important;
            border: 2px solid rgba(255, 255, 255, 0.3) !important;
            color: white !important;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }
        
        .welcome-page-button:hover {
            background: rgba(255, 255, 255, 0.3) !important;
            border-color: rgba(255, 255, 255, 0.5) !important;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.2);
        }
        
        .enter-room-input {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 2px solid rgba(255, 255, 255, 0.2) !important;
            color: white !important;
            backdrop-filter: blur(10px);
        }
        
        .enter-room-input::placeholder {
            color: rgba(255, 255, 255, 0.7) !important;
        }
        
        .welcome-card {
            background: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            backdrop-filter: blur(10px);
            border-radius: 16px;
        }
        
        .welcome-card h2 {
            color: white !important;
        }
        
        .welcome-card .title {
            color: white !important;
        }
        
        .welcome-card .subtitle {
            color: rgba(255, 255, 255, 0.8) !important;
        }
        
        /* Loading spinner animation */
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-spinner {
            animation: spin 1s linear infinite;
        }
        
        /* Ẩn fallback content khi Jitsi Meet load */
        .jitsi-loaded .welcome-card {
            display: none !important;
        }
        
        .jitsi-loaded #react {
            background: none !important;
        }
    </style>
</head>
<body class="nextgen-meet">
    <div id="react">
        <!-- Fallback content khi Jitsi Meet chưa load -->
        <div class="welcome-card" style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; text-align: center; padding: 2rem;">
            <div class="logo-container" style="margin-bottom: 2rem;">
                <h1 style="color: white; font-size: 3rem; font-weight: 700; margin: 0; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">thanhnguyen.group</h1>
            </div>
            <h2 style="color: white; font-size: 2.5rem; margin-bottom: 1rem; font-weight: 300;">NextGen Meet</h2>
            <p class="title" style="color: rgba(255, 255, 255, 0.9); font-size: 1.2rem; margin-bottom: 0.5rem;">Kiến tạo Trải nghiệm Hội nghị Truyền hình Đẳng cấp</p>
            <p class="subtitle" style="color: rgba(255, 255, 255, 0.7); font-size: 1rem; margin-bottom: 2rem;">Đang tải giao diện...</p>
            <div class="loading-spinner" style="width: 40px; height: 40px; border: 3px solid rgba(255, 255, 255, 0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
    </div>
    
    <!-- Interface Config - Load trước tất cả -->
    <script src="interface_config.js"></script>
    
    <!-- Global config fallback -->
    <script>
        if (typeof interfaceConfig === 'undefined') {
            window.interfaceConfig = {
                TOOLBAR_BUTTONS: ['microphone', 'camera', 'closedcaptions', 'desktop', 'fullscreen', 'fodeviceselection', 'hangup', 'profile', 'chat', 'recording', 'livestreaming', 'etherpad', 'sharedvideo', 'settings', 'raisehand', 'videoquality', 'filmstrip', 'invite', 'feedback', 'stats', 'shortcuts', 'tileview', 'videobackgroundblur', 'download', 'help', 'mute-everyone', 'e2ee', 'security'],
                SHOW_JITSI_WATERMARK: false,
                SHOW_WATERMARK_FOR_GUESTS: false,
                SHOW_POWERED_BY: false,
                DEFAULT_LOGO_URL: 'images/jitsilogo.png',
                PROVIDER_NAME: 'thanhnguyen.group',
                APP_NAME: 'NextGen Meet',
                LANG_DETECTION: true,
                DEFAULT_LANGUAGE: 'vi',
                DISABLE_DOMINANT_SPEAKER_INDICATOR: false,
                DISABLE_FOCUS_INDICATOR: false,
                DISABLE_JOIN_LEAVE_NOTIFICATIONS: false,
                DISABLE_PRESENCE_STATUS: false,
                DISABLE_RINGING: false,
                AUDIO_LEVEL_PRIMARY_COLOR: 'rgba(255,255,255,0.4)',
                AUDIO_LEVEL_SECONDARY_COLOR: 'rgba(255,255,255,0.2)',
                POLICY_LOGO: null,
                PROVIDER_URL: 'https://thanhnguyen.group'
            };
            console.log('NextGen Meet: Created fallback interfaceConfig');
        }
    </script>
    
    <!-- NextGen Meet JavaScript -->
    <script src="nextgen-inject.js"></script>
    
    <!-- Jitsi Meet JavaScript sẽ được load sau -->
    <script src="libs/lib-jitsi-meet.min.js"></script>
    <script src="libs/app.bundle.min.js"></script>
    
    <!-- Debug: Kiểm tra Jitsi Meet loading -->
    <script>
        console.log('NextGen Meet: HTML loaded');
        console.log('NextGen Meet: interfaceConfig available:', typeof interfaceConfig !== 'undefined');
        console.log('NextGen Meet: NextGenDesignTokens available:', typeof NextGenDesignTokens !== 'undefined');
        
        // Kiểm tra Jitsi Meet loading
        window.addEventListener('load', function() {
            console.log('NextGen Meet: Window loaded');
            console.log('NextGen Meet: React div:', document.getElementById('react'));
            
            // Detect Jitsi Meet loading
            setTimeout(function() {
                const reactDiv = document.getElementById('react');
                if (reactDiv && reactDiv.children.length > 1) {
                    console.log('NextGen Meet: Jitsi Meet loaded, hiding fallback content');
                    document.body.classList.add('jitsi-loaded');
                }
            }, 3000);
        });
        
        // Monitor for Jitsi Meet components
        const observer = new MutationObserver(function(mutations) {
            mutations.forEach(function(mutation) {
                if (mutation.type === 'childList' && mutation.target.id === 'react') {
                    const reactDiv = document.getElementById('react');
                    if (reactDiv && reactDiv.children.length > 1) {
                        console.log('NextGen Meet: Jitsi Meet components detected, hiding fallback content');
                        document.body.classList.add('jitsi-loaded');
                        observer.disconnect();
                    }
                }
            });
        });
        
        // Start observing
        observer.observe(document.getElementById('react'), { childList: true, subtree: true });
        
        // Handle Excalidraw errors gracefully
        window.addEventListener('unhandledrejection', function(event) {
            if (event.reason && event.reason.message && event.reason.message.includes('excalidraw')) {
                console.log('NextGen Meet: Ignoring Excalidraw error (whiteboard feature disabled)');
                event.preventDefault();
            }
        });
        
        // Handle ChunkLoadError for Excalidraw
        window.addEventListener('error', function(event) {
            if (event.message && event.message.includes('excalidraw')) {
                console.log('NextGen Meet: Ignoring Excalidraw ChunkLoadError (whiteboard feature disabled)');
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
